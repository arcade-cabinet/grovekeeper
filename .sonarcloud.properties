# Duplication exclusions — procedural biome modules share structure by design
# (each biome implements the same interface with different parameters),
# achievement/creature definitions are data-shaped so structural similarity is
# expected, and the cozy-shell sibling surfaces (MainMenu, NewGameScreen,
# LoadingGrove) intentionally share the same gradient backdrop + sun halo +
# leaf particles motif so the journey from landing → setup → loading reads
# as one continuous voice. The duplication is the design.
sonar.cpd.exclusions=src/game/world/biomes/**,src/db/migrations/**,src/systems/achievements.ts,src/game/scene/CreatureActor.ts,src/content/creatures/**,**/*.generated.ts,src/assets/manifest.generated.ts,src/ui/game/MainMenu.tsx,src/ui/game/NewGameScreen.tsx,src/ui/game/LoadingGrove.tsx
