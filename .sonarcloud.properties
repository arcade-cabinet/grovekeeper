# SonarCloud configuration for Grovekeeper
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-scope/

sonar.organization=arcade-cabinet
sonar.projectKey=arcade-cabinet_grovekeeper

# Source configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/public/**,src/db/migrations/**

# TypeScript configuration - point to root tsconfig to avoid S4325 false positives
# See: https://community.sonarsource.com/t/sudden-increase-of-false-positives-for-s4325/94441
sonar.typescript.tsconfigPaths=tsconfig.json

# Coverage report path (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Per-rule suppressions
# Sonar uses Ant-style patterns — brace expansion {ts,tsx} is NOT supported.
# Use separate criteria for .ts and .tsx, or use **/* for any extension.
#
# e1/e1b: S4325 (non-null assertion) — Miniplex ECS types components as optional
#     (tree?: TreeComponent) but after world.with('tree') filtering they are
#     guaranteed present. The ! assertion is the correct and only access path.
# e2/e2b: S2245 (insecure pseudorandom) — Math.random in game code is gameplay RNG,
#     not security-sensitive. Cryptographic randomness is not appropriate here.
# e3/e3b: S1135 (TODO comments) — INFO severity. TODOs are tracked in the project
#     plans and are valid in active development.
# e4/e4b: S3776 (cognitive complexity) — generators/state machines/biome systems
#     have high branching by nature. Refactor opportunistically, not gated.
# e5/e5b: S2933 (readonly members) — actor classes hold component refs that are
#     immutable by convention; mass refactor not worthwhile.
# e6/e6b: S7748/S7763/S7764/S7758/S7741 — modern TS style nits (globalThis.X,
#     export...from, charCodeAt, etc.). Bulk auto-fix opportunity, not a gate.
# e7: S3735 (void operator) — used intentionally in fire-and-forget async calls
#     in the BabylonJS scene runtime where awaiting would deadlock the loop.
sonar.issue.ignore.multicriteria=e1,e1b,e2,e2b,e3,e3b,e4,e4b,e5,e5b,e6a,e6b,e6c,e6d,e6e,e7

sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S4325
sonar.issue.ignore.multicriteria.e1.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e1b.ruleKey=typescript:S4325
sonar.issue.ignore.multicriteria.e1b.resourceKey=src/**/*.tsx

sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e2.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e2b.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e2b.resourceKey=src/**/*.tsx

sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.e3.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e3b.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.e3b.resourceKey=src/**/*.tsx

sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e4b.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e4b.resourceKey=src/**/*.tsx

sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S2933
sonar.issue.ignore.multicriteria.e5.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e5b.ruleKey=typescript:S2933
sonar.issue.ignore.multicriteria.e5b.resourceKey=src/**/*.tsx

sonar.issue.ignore.multicriteria.e6a.ruleKey=typescript:S7748
sonar.issue.ignore.multicriteria.e6a.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e6b.ruleKey=typescript:S7763
sonar.issue.ignore.multicriteria.e6b.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e6c.ruleKey=typescript:S7764
sonar.issue.ignore.multicriteria.e6c.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e6d.ruleKey=typescript:S7758
sonar.issue.ignore.multicriteria.e6d.resourceKey=src/**/*.ts
sonar.issue.ignore.multicriteria.e6e.ruleKey=typescript:S7741
