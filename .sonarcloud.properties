sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S3735
sonar.issue.ignore.multicriteria.e7.resourceKey=src/game/scene/runtime.ts

# Duplication exclusions — procedural biome modules share structure by design
# (each biome implements the same interface with different parameters), and
# achievement/creature definitions are data-shaped so structural similarity is
# expected. The duplication is intentional, not a copy-paste smell.
sonar.cpd.exclusions=src/game/world/biomes/**,src/db/migrations/**,src/systems/achievements.ts,src/game/scene/CreatureActor.ts,src/content/creatures/**
