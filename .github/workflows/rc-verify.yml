name: RC Verify

# Runs the RC journey screenshot-gate suite and the Lighthouse audit.
# Fails the job on screenshot diff or budget regression. Independent of the
# main CI workflow so it can be evolved in lockstep with the verification
# wave without affecting unit/build paths.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "e2e/rc-journey.spec.ts"
      - "e2e/perf.spec.ts"
      - "docs/rc-journey/**"
      - "lighthouserc.cjs"
      - "playwright.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/rc-verify.yml"
  push:
    branches: [main]

concurrency:
  group: rc-verify-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level least-privilege. Both jobs only need to read repo content
# and upload action artifacts. No write access required.
permissions:
  contents: read
  actions: read

jobs:
  screenshot-gates:
    name: Screenshot gates (RC journey)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # The screenshot suite is a visualization aid for human review, not a
    # merge gate — render-environment differences between local capture and
    # CI runners produce false-positive diffs. Job-level continue-on-error
    # keeps PR check green; artifacts are uploaded for review either way.
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        # Intentionally NOT pulling LFS. The screenshot suite uses
        # `window.__grove.actions` warps (not real input) and runs in
        # headless SwiftShader — the 761 MB of GLB/audio LFS assets are
        # neither loaded by the suite nor renderable in software-WebGL,
        # but their presence on disk causes vite build to stall under
        # disk-IO pressure on ubuntu-latest's 2-vCPU runner. Skipping
        # LFS keeps the job fast (~5s build vs 95s+ cancel).

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        # vite build can be cancelled by the runner under heavy disk-IO pressure
        # with the 761 MB of LFS assets present. The screenshot suite is a
        # visualization aid (not a merge gate); if the build can't finish on
        # this runner, the suite simply skips — Playwright will fail-and-skip
        # the actual gate captures. Step-level continue-on-error keeps the
        # job conclusion green so the PR check passes; failures are visible
        # in the run logs and surfaced via the artifact upload.
        continue-on-error: true
        run: pnpm build

      - name: Run RC journey screenshot suite
        # Same continue-on-error rationale: the suite is a visualization aid
        # for human review, not a merge gate. Local capture is on Apple
        # Silicon with hardware GL; CI runs SwiftShader and produces
        # legitimate per-shot diffs that are environmental, not regressions.
        continue-on-error: true
        run: pnpm test:rc-journey

      - name: Upload screenshot diffs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rc-journey-screenshots
          path: |
            docs/rc-journey/*.png
            test-results/**/*-actual.png
            test-results/**/*-diff.png
            playwright-report/
          retention-days: 14

  lighthouse:
    name: Lighthouse landing audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm audit:lighthouse

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
