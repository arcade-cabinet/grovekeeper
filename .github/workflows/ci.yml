name: CI

# Mirrors the mean-streets pattern: pull_request only, no push: branches: [main].
# Push to main is handled by release.yml + cd.yml. Running CI on push to main
# duplicates work and previously caused phantom 0-second startup_failure runs
# on non-main branches when GitHub's workflow validator triggered on the push
# event without a matching branch filter context.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level least-privilege. None of the jobs need write access; the
# release pipeline (release.yml) handles tag/asset writes separately.
permissions:
  contents: read
  actions: read

jobs:
  check:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint + Format check
        # `pnpm check` is biome's combined lint + format gate.
        # `pnpm lint` alone misses format-only drift, which can land on
        # main when contributors skip `pnpm format` or pre-commit hooks.
        run: pnpm check

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        # Intentionally NOT pulling LFS. The dist/ this job uploads is
        # consumed by `bundle-size` (JS-only inspection) and was previously
        # consumed by `playthrough` (retired in cbdc686). The deployed Pages
        # build runs in cd.yml on push:main with `lfs: true` separately.
        # Skipping LFS here keeps the build in the ~5s envelope; pulling
        # 761 MB causes vite build to stall under 2-vCPU runner disk-IO.

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 3

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        # Intentionally NOT pulling LFS. size-limit only inspects the JS
        # bundle output (dist/assets/*.js); GLB/audio LFS assets aren't part
        # of the size budget. Pulling 761 MB causes vite build to stall
        # under disk-IO pressure on ubuntu-latest's 2-vCPU runner (same
        # pattern that hit screenshot-gates before c3aa00d).

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: pnpm size

  # The legacy `playthrough` job (e2e/playthrough.spec.ts) was retired in the
  # RC redesign — it was authoritative for the pre-redesign 9-zone BabylonJS
  # game and broke once MainMenu was rewritten and the engine swapped to
  # Jolly Pixel. The new authoritative end-to-end suite is e2e/rc-journey.spec.ts,
  # exercised by the rc-verify.yml workflow's `screenshot-gates` job.

  # T103: Android APK debug build
  # NOTE: This job requires "npx cap add android" to have been run locally and
  # the generated android/ directory committed to the repository.
  # Currently android/ does not exist in the repo. Run "npx cap add android"
  # and commit the result before this job will activate.
  android-apk:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    # The job always runs but every build step is gated on the
    # `android-check.outputs.present` flag set by the first step. We can't
    # use `hashFiles()` in a job-level `if:` (GitHub Actions does not allow
    # the function in that context — see actionlint warning), so the
    # presence probe lives inside the job and produces a step output.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - name: Check for Android project
        id: android-check
        run: |
          if [ -f android/gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::android/ not present yet — APK steps skipped."
          fi

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4
        if: steps.android-check.outputs.present == 'true'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.android-check.outputs.present == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Set up JDK 21 (Temurin)
        if: steps.android-check.outputs.present == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        if: steps.android-check.outputs.present == 'true'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          api-level: 34
          build-tools-version: '34.0.0'

      - if: steps.android-check.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        if: steps.android-check.outputs.present == 'true'
        run: pnpm build

      - name: Sync Capacitor
        if: steps.android-check.outputs.present == 'true'
        run: npx cap sync android

      - name: Build debug APK
        if: steps.android-check.outputs.present == 'true'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        if: steps.android-check.outputs.present == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grovekeeper-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
