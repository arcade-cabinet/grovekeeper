name: Deploy

# T105: Deploy to GitHub Pages on every push to main.
#
# Architecture note (ci -> release -> cd split):
# - release.yml owns: release-please PR management + building/attaching release
#   tarballs and APKs to tagged GitHub Releases (tag-driven).
# - cd.yml owns: GitHub Pages deployment on every push to main (continuous deploy).
#
# Compromise: because release.yml's build-release job only runs on release-please
# tag events (not on every push), cd.yml cannot purely consume release.yml artifacts
# for non-release pushes. cd.yml therefore performs its own build for Pages. This is
# intentional -- Pages always reflects HEAD of main, not only tagged releases.
# When release.yml does produce a tagged release, its web tarball is attached to the
# GitHub Release; that artifact and the Pages deployment are identical in content.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build for Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
