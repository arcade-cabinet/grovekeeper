# Flow: New Grove creation (legacy — updated for survival-only NewGameModal)
# Verifies: tap New Grove -> select difficulty -> enter seed -> start game
# Touch targets: all buttons min-h-[44px] or min-h-[48px] per component styles
# Platform: iOS simulator (375px viewport portrait)
appId: ${APP_ID}
---
- launchApp:
    clearState: true
- assertVisible: "GROVEKEEPER"

# Tap the primary CTA — "Start Growing" on a fresh install (0 trees planted)
- tapOn:
    id: "btn-new-grove"

# NewGameModal opens (title "New Grove")
- assertVisible: "New Grove"

# Verify World Seed field is visible
- assertVisible:
    accessibilityLabel: "World seed phrase"

# Select Sapling difficulty (default)
- tapOn:
    accessibilityLabel: "Sapling: The intended experience"

# Start the game
- tapOn:
    id: "btn-begin-grove"

# Game screen rendered — HUD menu button should be visible
- assertVisible:
    id: "btn-open-menu"
    timeout: 15000
