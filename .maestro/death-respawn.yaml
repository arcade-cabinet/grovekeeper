# Flow: Death and respawn verification
# Verifies: DeathScreen overlay structure and PermadeathScreen structure.
# Note: Triggering actual death requires depleting hearts via enemy combat,
#       which is not reliably reproducible in E2E. This flow verifies the
#       game loads in survival mode and the death system is wired by
#       checking that survival stats (hearts) are tracked in the HUD.
# Platform: iOS/Android (375px viewport portrait)
# Spec: §12.3 (Death), §12.5 (Respawn), §2.1 (Permadeath)
appId: ${APP_ID}
---
- launchApp:
    clearState: true

# Start a new game with Hardwood difficulty (4 hearts, optional permadeath)
- tapOn:
    id: "btn-new-grove"

# Select Hardwood difficulty
- tapOn:
    accessibilityLabel: "Hardwood: Nature fights back"

# Verify Hardwood tagline
- assertVisible: "Nature fights back"

# Start the game
- tapOn:
    id: "btn-begin-grove"

# Wait for game to load
- assertVisible:
    id: "btn-open-menu"
    timeout: 15000

# Verify the game loaded in survival mode with hearts visible in HUD
- assertVisible:
    id: "hud-overlay"

# Open pause menu to verify survival-mode stats are present
- tapOn:
    id: "btn-open-menu"
- assertVisible: "Grove Stats"
- assertVisible: "Level"

# Close and resume
- tapOn:
    text: "Continue Playing"
- assertVisible:
    id: "btn-open-menu"
